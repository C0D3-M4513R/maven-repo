name: build docker
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    permissions:
      actions: write #manage cache
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            system: x86_64-linux
            runner: ubuntu-24.04
          - arch: arm64
            system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      # Check out the package
      - uses: actions/checkout@v4

      # Install Nix and cache its store
      # https://github.com/nix-community/cache-nix-action/issues/60#issuecomment-2691276764
      #      - uses: cachix/install-nix-action@v30
      #        with:
      #          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: nixbuild/nix-quick-install-action@v30
      - name: Restore and cache Nix store
        uses: nix-community/cache-nix-action@v6
        continue-on-error: true
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{matrix.arch}}-${{ hashFiles('**/*.nix') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          gc-max-store-size-linux: 1073741824
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: cache-${{ runner.os }}-${{matrix.arch}}-
          # created more than this number of seconds ago relative to the start of the `Post Restore` phase
          purge-created: 0
          # except the version with the `primary-key`, if it exists
          purge-primary-key: never

      # Build the package defined in the Nix Flake
      - name: Build the derivation defined in the Nix Flake
        run: nix --extra-experimental-features nix-command --extra-experimental-features flakes build .#$(yq .package.name Cargo.toml) -L
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "c0d3-m4513r"
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Load image
        run: docker load -i result
      - name: Tag commit as Release
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          tag=$(yq .package.version Cargo.toml)
          git tag "$tag"
          git push origin "$tag" --force-with-lease

      - name: re-tag as version and push
        run: |
          version=$(yq .package.version Cargo.toml)
          docker tag $(yq .package.name Cargo.toml):${version}-${{ matrix.arch }} ghcr.io/c0d3-m4513r/maven-repo:${GITHUB_SHA}-${{ matrix.arch }}
          docker push ghcr.io/c0d3-m4513r/maven-repo:${GITHUB_SHA}-${{ matrix.arch }}

  multi-arch:
    permissions:
      packages: write
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Check out the package
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "c0d3-m4513r"
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Version manifest
        run: |
          version=${GITHUB_SHA}
          docker manifest create ghcr.io/c0d3-m4513r/c0d3-m4513r:${version} ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-amd64 ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-arm64
          docker manifest annotate ghcr.io/c0d3-m4513r/c0d3-m4513r:${version} ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-amd64 --arch amd64
          docker manifest annotate ghcr.io/c0d3-m4513r/c0d3-m4513r:${version} ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-arm64 --arch arm64
          docker manifest push ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}

      - name: Create and Push latest manifest
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          version=${GITHUB_SHA}
          docker manifest create ghcr.io/c0d3-m4513r/c0d3-m4513r:latest ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-amd64 ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-arm64
          docker manifest annotate ghcr.io/c0d3-m4513r/c0d3-m4513r:latest ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-amd64 --arch amd64
          docker manifest annotate ghcr.io/c0d3-m4513r/c0d3-m4513r:latest ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-arm64 --arch arm64
          docker manifest push ghcr.io/c0d3-m4513r/c0d3-m4513r:latest

      - name: Create and Push nightly manifest
        if: ${{ github.ref == 'refs/heads/dev' }}
        run: |
          version=${GITHUB_SHA}
          docker manifest create ghcr.io/c0d3-m4513r/c0d3-m4513r:nightly ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-amd64 ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-arm64
          docker manifest annotate ghcr.io/c0d3-m4513r/c0d3-m4513r:nightly ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-amd64 --arch amd64
          docker manifest annotate ghcr.io/c0d3-m4513r/c0d3-m4513r:nightly ghcr.io/c0d3-m4513r/c0d3-m4513r:${version}-arm64 --arch arm64
          docker manifest push ghcr.io/c0d3-m4513r/c0d3-m4513r:nightly